# EMA Q&A acronym/synonym dictionary — v1
# Used by harness/ablations/a1_query_expansion.py for query expansion.
#
# Schema per entry:
#   acronym:          The short form as it appears in questions
#   canonical:        Full human-readable expansion
#   synonyms:         Alternate phrasings (retrieved documents may use these)
#   context_disambiguation: When acronym is ambiguous — what context triggers this sense
#   topic_paths_where_relevant: Substring matches against corpus topic_path field

acronyms:

