# A2 (concept mode) — Hybrid retrieval + IDMP concept metadata pre-filter
# Requires the index to have concept tags (run: python3 scripts/tag_concepts.py)
run_id: ablation_a_a2_concept
description: "A2 concept: hybrid RRF + IDMP concept metadata pre-filter"

retrieval:
  mode: hybrid
  k: 10

ablation:
  topic_filter:
    enabled: true
    mode: concept   # pre-filter nodes by IDMP concept metadata

index:
  corpus: ~/Nextcloud/Datasets/ema_nlp/corpus/corpus.jsonl
  index_dir: ~/Nextcloud/Datasets/ema_nlp/index
  embed_model: BAAI/bge-large-en-v1.5
  force_rebuild: false

benchmark:
  path: benchmark/benchmark.jsonl

judge:
  enabled: false
  model: claude-haiku-4-5-20251001
  sample_fraction: 1.0

cache: false   # interactive cache disabled for batch eval runs

results:
  base_dir: results
