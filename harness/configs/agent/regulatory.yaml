# EMA regulatory Q&A agent (native LlamaIndex FunctionAgent).
# Toolset, system prompt, and output schema are all config-driven (aim 3) — adding
# a tool here (once registered in harness/tools) needs no code change.
# Only tools implemented today are listed; follow_links / lookup_limit are planned
# (see docs/TARGET_ARCHITECTURE.md §4.3 / §7).
agent:
  model_role: agent              # -> harness/configs/models.yaml
  system_prompt: agent_regulatory.md
  tools:
    - ema_search
    - resolve_substance
  output_schema: RegulatoryAnswer
  retrieval_profile: neo4j_hier
  fewshot:                       # online policy (aim 1); consumed once feedback exists
    source: mlflow_rated
    k: 3
    min_rating: 4
