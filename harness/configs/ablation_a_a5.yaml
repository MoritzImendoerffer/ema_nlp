# A5 — Combined: A1 + A2 keyword filter + A3 SME reranker
# The full stack: query expansion + topic filter + LLM reranking.
run_id: ablation_a_a5
description: "A5: A1 (expansion) + A2 (keyword filter) + A3 (SME reranker) combined"

retrieval:
  mode: hybrid
  k: 10

ablation:
  query_expansion:
    enabled: true
    acronym_dict: ablations/A_evidence_filter/acronym_dict.yaml
  topic_filter:
    enabled: true
    mode: keyword
  reranker: sme
  reranker_model: claude-haiku-4-5-20251001
  reranker_max_chunks: 5

index:
  corpus: ~/Nextcloud/Datasets/ema_nlp/corpus/corpus.jsonl
  index_dir: ~/Nextcloud/Datasets/ema_nlp/index
  embed_model: BAAI/bge-large-en-v1.5
  force_rebuild: false

benchmark:
  path: benchmark/benchmark.jsonl

judge:
  enabled: false
  model: claude-haiku-4-5-20251001
  sample_fraction: 1.0

results:
  base_dir: results
