# Baseline A0+ — hybrid retrieval (dense + BM25 via RRF)
run_id: baseline_a0plus
description: "A0+ baseline: hybrid RRF retrieval (dense + BM25)"

retrieval:
  mode: hybrid      # "dense" | "bm25" | "hybrid"
  k: 10

index:
  corpus: ~/Nextcloud/Datasets/ema_nlp/corpus/corpus.jsonl
  index_dir: ~/Nextcloud/Datasets/ema_nlp/index
  embed_model: BAAI/bge-large-en-v1.5
  force_rebuild: false

benchmark:
  path: benchmark/benchmark.jsonl

judge:
  enabled: false
  model: claude-haiku-4-5-20251001
  sample_fraction: 1.0

results:
  base_dir: results
