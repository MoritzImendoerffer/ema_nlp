# A1 — Hybrid retrieval + acronym-aware query expansion
run_id: ablation_a_a1
description: "A1: hybrid RRF + SME acronym dictionary query expansion"

retrieval:
  mode: hybrid
  k: 10

ablation:
  query_expansion:
    enabled: true
    acronym_dict: ablations/A_evidence_filter/acronym_dict.yaml

index:
  corpus: ~/Nextcloud/Datasets/ema_nlp/corpus/corpus.jsonl
  index_dir: ~/Nextcloud/Datasets/ema_nlp/index
  embed_model: BAAI/bge-large-en-v1.5
  force_rebuild: false

benchmark:
  path: benchmark/benchmark.jsonl

judge:
  enabled: true
  model: claude-sonnet-4-6
  sample_fraction: 1.0


results:
  base_dir: ~/Nextcloud/Datasets/ema_nlp/results
