# Default index profile — hierarchical PropertyGraphIndex on Neo4j.
# Selected by EMA_INDEX_PROFILE (default: neo4j_hier).
#
# Neo4j connection is NOT here (it's credentials) — set NEO4J_URI / NEO4J_USER /
# NEO4J_PASSWORD in ~/.myenvs/ema_nlp.env. On this host the project container
# runs on alt ports, so: NEO4J_URI=bolt://localhost:7688

index:
  kind: property_graph              # only kind in v1 (INDEX_REGISTRY seam allows more)
  source: mongo_parsed_documents    # narrative corpus (Mongo parsed_documents), not corpus.jsonl
  embed_model: BAAI/bge-large-en-v1.5
  store:
    graph: neo4j                    # Neo4jPropertyGraphStore (holds nodes/edges + native vector index)
  chunking:
    parser: hierarchical            # multi-level; parent/child kept (R4/FR6)
    chunk_sizes: [2048, 512, 128]   # big -> small, for small-to-big retrieval
  scope:                            # subset selector applied during ingestion
    committee: []                   # [] = all committees
    topic_prefix: ""                # "" = no topic filter
    limit: null                     # null = FULL corpus (matches the live 79,882-doc graph).
                                    # Set a small number (e.g. 50) only in a $EMA_CONFIG_DIR
                                    # override profile for CPU iteration — never here (F11).

retrieval:
  strategy: hierarchical            # small-to-big merge (+ optional links-to expansion)
  k: 10
  merge: true                       # merge retrieved leaf chunks up to their parents
  # Source-category steering is OFF in this profile (plain top-k). The agent's
  # per-call `source_category` filter still works here (it oversamples on demand,
  # default oversample: 4). For quotas + link-graph expansion see the
  # neo4j_steered profile / docs/RETRIEVAL.md; both need :Document.category
  # (scripts/backfill_doc_categories.py).
  # oversample: 4                   # candidate pool multiplier when filtering/stratifying
  # category_quota: {}              # e.g. {scientific_guideline: 2, qa: 1}
  graph:
    max_hops: 1
    edge_types: [links_to]
    expand: false                   # links-to expansion (see neo4j_steered.yaml)
