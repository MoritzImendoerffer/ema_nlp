# Diagnostic config: react workflow with Opus agent — 8 question sample
# Used by HITL-004a to test whether format compliance improves with a stronger model.
# Do NOT use for benchmark runs. Delete after diagnosis is complete.
run_id: diag_react_opus
description: "Diagnostic: react on 8-question sample with claude_opus as agent role"

retrieval:
  strategy: flat
  mode: hybrid
  k: 10

orchestration:
  strategy: react
  cache_inject: false

index:
  corpus: ~/Nextcloud/Datasets/ema_nlp/corpus/corpus.jsonl
  index_dir: ~/Nextcloud/Datasets/ema_nlp/index
  embed_model: BAAI/bge-large-en-v1.5
  force_rebuild: false

benchmark:
  path: /tmp/diag_benchmark.jsonl

judge:
  enabled: true
  model: claude-sonnet-4-6
  sample_fraction: 1.0

results:
  base_dir: ~/Nextcloud/Datasets/ema_nlp/results
