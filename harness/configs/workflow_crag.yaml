# Workflow axis: CRAG on A0+ retrieval
run_id: workflow_crag
description: "Workflow comparison: CRAG answer gen on A0+ hybrid retrieval"

retrieval:
  strategy: flat
  mode: hybrid
  k: 10

orchestration:
  strategy: crag

index:
  corpus: ~/Nextcloud/Datasets/ema_nlp/corpus/corpus.jsonl
  index_dir: ~/Nextcloud/Datasets/ema_nlp/index
  embed_model: BAAI/bge-large-en-v1.5
  force_rebuild: false

benchmark:
  path: benchmark/benchmark.jsonl

judge:
  enabled: true
  model: claude-sonnet-4-6
  sample_fraction: 1.0

cache: false

results:
  base_dir: ~/Nextcloud/Datasets/ema_nlp/results
