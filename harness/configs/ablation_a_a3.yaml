# A3 — Hybrid retrieval + LLM reranker with SME relevance rubric
# Requires ANTHROPIC_API_KEY. Budget: ~max_chunks LLM calls per benchmark question.
run_id: ablation_a_a3
description: "A3: hybrid RRF + LLM reranker (SME rubric)"

retrieval:
  mode: hybrid
  k: 10

ablation:
  reranker: sme                          # uses harness/prompts/relevance_rubric_sme.md
  reranker_model: claude-haiku-4-5-20251001
  reranker_max_chunks: 5                 # score top-5 chunks, re-order, append rest

index:
  corpus: ~/Nextcloud/Datasets/ema_nlp/corpus/corpus.jsonl
  index_dir: ~/Nextcloud/Datasets/ema_nlp/index
  embed_model: BAAI/bge-large-en-v1.5
  force_rebuild: false

benchmark:
  path: benchmark/benchmark.jsonl

judge:
  enabled: false
  model: claude-haiku-4-5-20251001
  sample_fraction: 1.0

cache: false   # interactive cache disabled for batch eval runs

results:
  base_dir: results
