# Default parser preference (per MIME content_type), highest priority first.
#
# NOTE: the consumer of this file — the old `harness.embed_pg.sync` pipeline and
# its `--parser-preference` CLI flag — was deleted in the LlamaIndex/Neo4j
# refactor (LIR-012). The current ingestion path (`harness.indexing.ingest`)
# reads a single parser per URL from Mongo `parsed_documents` and does NOT yet
# consume this file; preference-based selection is a planned refinement
# (see the comment in `harness/indexing/ingest.py`). This file is retained as
# the intended default for when that selection is wired back in.

application/pdf:
  - pymupdf4llm
text/html:
  - trafilatura
