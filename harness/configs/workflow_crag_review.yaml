# Workflow axis: crag_review on A0+ retrieval
run_id: workflow_crag_review
description: "Workflow comparison: crag_review (CRAG + SME review step) on A0+ hybrid retrieval"

retrieval:
  strategy: flat
  mode: hybrid
  k: 10

orchestration:
  strategy: crag_review

index:
  corpus: ~/Nextcloud/Datasets/ema_nlp/corpus/corpus.jsonl
  index_dir: ~/Nextcloud/Datasets/ema_nlp/index
  embed_model: BAAI/bge-large-en-v1.5
  force_rebuild: false

benchmark:
  path: benchmark/benchmark.jsonl

judge:
  enabled: true
  model: claude-sonnet-4-6
  sample_fraction: 1.0


results:
  base_dir: ~/Nextcloud/Datasets/ema_nlp/results
