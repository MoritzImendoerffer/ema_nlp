# Baseline A0 — dense retrieval only (VectorStoreIndex + BGE-large-en)
run_id: baseline_a0
description: "A0 baseline: dense retrieval only, no hybrid, no ablations"

retrieval:
  mode: dense       # "dense" | "bm25" | "hybrid"
  k: 10

index:
  corpus: ~/Nextcloud/Datasets/ema_nlp/corpus/corpus.jsonl
  index_dir: ~/Nextcloud/Datasets/ema_nlp/index
  embed_model: BAAI/bge-large-en-v1.5
  force_rebuild: false

benchmark:
  path: benchmark/benchmark.jsonl

judge:
  enabled: false    # set true once ANTHROPIC_API_KEY is available
  model: claude-haiku-4-5-20251001
  sample_fraction: 1.0

results:
  base_dir: results
