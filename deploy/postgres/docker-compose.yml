services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ema_nlp_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-ema_nlp}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-ema_nlp}"
      POSTGRES_DB: "${POSTGRES_DB:-ema_nlp}"
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - ema_nlp_pgdata:/var/lib/postgresql/data
    shm_size: 256mb
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-ema_nlp}", "-d", "${POSTGRES_DB:-ema_nlp}"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  ema_nlp_pgdata:
    name: ema_nlp_pgdata
